<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DETERMINANT | 十如仕 AI 穿搭定制</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #000; /* 背景设为黑色防止闪白 */
            color: #222;
            margin: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        .fade-out { animation: fadeOut 0.5s ease-in forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; pointer-events: none; } }

        /* 滑块样式 */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 22px; height: 22px;
            background: #000; border: 4px solid #fff; border-radius: 50%;
            cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2); margin-top: -10px;
        }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; background: #ddd; }

        .step-content { display: none; }
        .step-content.active { display: block; }

        /* 视频专用样式：确保在手机端置顶 */
        #ar-video {
            object-fit: cover;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body class="bg-[#F4F4F4]">

    <!-- 1. 入口屏 -->
    <div id="start-screen" class="fixed inset-0 z-50 bg-[#030604] flex flex-col items-center justify-center">
        <div class="mb-10 opacity-80">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="1"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <button id="start-btn" onclick="handleStart()" class="bg-[#d4af37] text-white px-12 py-4 rounded-full text-sm tracking-[0.4em] active:scale-95 transition-transform shadow-lg">
            开启 AR 溯源
        </button>
        <p id="loading-text" class="text-[#d4af37]/40 text-[10px] mt-8 tracking-widest uppercase">Tap to Experience</p>
    </div>

    <!-- 2. 全屏视频播放器 -->
    <div id="video-screen" class="fixed inset-0 z-40 bg-black hidden items-center justify-center overflow-hidden">
        <video 
            id="ar-video" 
            playsinline 
            webkit-playsinline 
            x5-playsinline
            x5-video-player-type="h5-page"
            x5-video-player-fullscreen="true"
            preload="auto"
            muted
        >
            <source src="https://github.com/kristenkwan721-art/vid/raw/refs/heads/main/vidproj.mp4" type="video/mp4">
            <source src="ar-animation.mp4" type="video/mp4">
        </video>

        <div class="absolute inset-0 flex flex-col justify-between p-10 pointer-events-none">
            <div class="text-[#d4af37] text-[10px] tracking-widest text-center mt-10">DETERMINANT AR ANIMATION</div>
            <div class="flex justify-center mb-10">
                <button onclick="skipVideo()" class="pointer-events-auto text-white/40 text-[10px] tracking-widest border-b border-white/20 pb-1">SKIP 跳过播放</button>
            </div>
        </div>
    </div>

    <!-- 3. AI 定制主程序 -->
    <div id="main-app" class="hidden min-h-screen bg-white max-w-md mx-auto relative flex flex-col">
        <header class="p-8 pt-12 border-b border-gray-50 flex justify-between items-end">
            <div>
                <h1 class="text-xl font-bold tracking-[0.3em]">DETERMINANT</h1>
                <p class="text-[9px] text-gray-400 mt-1 uppercase tracking-widest">AI Customization</p>
            </div>
            <div id="step-num" class="text-[10px] text-gray-300 font-bold">1/3</div>
        </header>

        <main class="flex-1 p-8 overflow-y-auto hide-scrollbar">
            <!-- 步骤 1: 身材数字化 -->
            <div id="step-1" class="step-content active fade-in">
                <h2 class="text-lg font-medium mb-10">身材数字化</h2>
                <div class="space-y-12">
                    <div class="flex gap-8">
                        <div class="flex-1 border-b border-black pb-2">
                            <label class="text-[10px] text-gray-400 uppercase">身高 CM</label>
                            <input type="number" id="height" value="175" class="w-full text-xl font-light outline-none bg-transparent mt-2">
                        </div>
                        <div class="flex-1 border-b border-black pb-2">
                            <label class="text-[10px] text-gray-400 uppercase">体重 KG</label>
                            <input type="number" id="weight" value="70" class="w-full text-xl font-light outline-none bg-transparent mt-2">
                        </div>
                    </div>
                    <div class="space-y-8">
                        <div>
                            <div class="flex justify-between items-end mb-4">
                                <label class="text-[10px] text-gray-400 uppercase">胸围</label>
                                <span class="text-sm font-medium"><span id="val-bust">98</span> cm</span>
                            </div>
                            <input type="range" id="bust" min="70" max="130" value="98" oninput="updateRange('bust')">
                        </div>
                        <div>
                            <div class="flex justify-between items-end mb-4">
                                <label class="text-[10px] text-gray-400 uppercase">腰围</label>
                                <span class="text-sm font-medium"><span id="val-waist">82</span> cm</span>
                            </div>
                            <input type="range" id="waist" min="60" max="120" value="82" oninput="updateRange('waist')">
                        </div>
                    </div>
                </div>
                <button onclick="nextStep(2)" class="w-full mt-16 bg-black text-white py-5 text-[11px] font-bold tracking-[0.2em]">CONTINUE</button>
            </div>

            <!-- 步骤 2: 色彩测试 -->
            <div id="step-2" class="step-content fade-in">
                 <h2 class="text-lg font-medium mb-10">色彩测试</h2>
                 <div class="grid grid-cols-1 gap-4">
                    <div onclick="setTone('warm', this)" class="p-6 border border-gray-100 rounded-sm active:bg-gray-50 transition-colors">暖色调 Warm</div>
                    <div onclick="setTone('cool', this)" class="p-6 border border-gray-100 rounded-sm active:bg-gray-50 transition-colors">冷色调 Cool</div>
                 </div>
                 <button onclick="nextStep(3)" class="w-full mt-16 bg-black text-white py-5 text-[11px] font-bold tracking-[0.2em]">NEXT</button>
            </div>

            <!-- 步骤 3: 报告生成 -->
            <div id="step-3" class="step-content fade-in">
                 <h2 class="text-lg font-medium mb-10">正在生成报告...</h2>
                 <button onclick="showReport()" class="w-full mt-16 bg-black text-white py-5 text-[11px] font-bold tracking-[0.2em]">VIEW REPORT</button>
            </div>
            
            <!-- 结果页 -->
            <div id="step-report" class="step-content fade-in pb-20 text-center">
                 <p class="text-gray-400 text-[10px] mb-4">YOUR RESULTS</p>
                 <h3 class="text-2xl font-light mb-10">H型均称身形</h3>
                 <div class="bg-gray-50 p-6 text-xs leading-loose text-left text-gray-500">
                     建议选择十如仕 Slim Fit 系列，DP100免烫技术确保全天候挺括。
                 </div>
                 <button onclick="location.reload()" class="mt-10 text-[10px] text-gray-400 underline tracking-widest uppercase">Restart</button>
            </div>
        </main>
    </div>

    <script>
        const video = document.getElementById('ar-video');
        const startScreen = document.getElementById('start-screen');
        const videoScreen = document.getElementById('video-screen');
        const loadingText = document.getElementById('loading-text');

        // 核心：处理点击播放
        function handleStart() {
            loadingText.innerText = "LOADING AR...";
            
            // 1. 先通过用户点击行为尝试触发视频播放 (必须要用户点击)
            video.load();
            const playPromise = video.play();

            if (playPromise !== undefined) {
                playPromise.then(() => {
                    // 播放成功，显示视频界面
                    startScreen.classList.add('fade-out');
                    setTimeout(() => {
                        startScreen.style.display = 'none';
                        videoScreen.classList.remove('hidden');
                        videoScreen.classList.add('flex');
                    }, 500);
                }).catch(error => {
                    // 如果被浏览器策略拦截，直接进入主程序
                    console.error("Auto-play failed:", error);
                    skipVideo();
                });
            }

            // 保护机制：如果视频在 2.5 秒内没开始播放，自动跳过
            setTimeout(() => {
                if (video.paused && !videoScreen.classList.contains('hidden')) {
                    skipVideo();
                }
            }, 2500);
        }

        // 视频结束监听
        video.addEventListener('ended', skipVideo);

        // 跳过视频逻辑
        function skipVideo() {
            video.pause();
            videoScreen.classList.add('fade-out');
            startScreen.classList.add('fade-out');
            
            setTimeout(() => {
                startScreen.style.display = 'none';
                videoScreen.style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('main-app').classList.add('fade-in');
            }, 500);
        }

        // 后续逻辑保持不变
        function updateRange(id) { document.getElementById('val-' + id).innerText = document.getElementById(id).value; }
        function nextStep(n) {
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            document.getElementById('step-' + n).classList.add('active');
            document.getElementById('step-num').innerText = n + '/3';
        }
        function setTone(t, el) {
            document.querySelectorAll('#step-2 div').forEach(d => d.classList.remove('border-black', 'bg-gray-50'));
            el.classList.add('border-black', 'bg-gray-50');
        }
        function showReport() {
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            document.getElementById('step-report').classList.add('active');
            document.getElementById('step-num').innerText = 'RESULT';
        }
    </script>
</body>
</html>
